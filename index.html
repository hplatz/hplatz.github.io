<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamKuma | Indie Game Studio</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #000000;
            --off-black: #0a0a0a;
            --dim: #1a1a1a;
            --border: #2a2a2a;
            --muted: #555;
            --soft: #999;
            --white: #ffffff;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── HERO ── */
        .hero {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 60px 20px 80px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 50% 40%, #1a1a1a 0%, transparent 70%),
                radial-gradient(ellipse 100% 80% at 50% 100%, #111 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-inner {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* 로고 */
        .logo-wrap {
            margin-bottom: 20px;
        }

        .logo {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            filter: drop-shadow(0 0 60px rgba(255,255,255,0.1));
        }

        /* 팀명 */
        .team-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            line-height: 1;
            text-align: center;
            margin-bottom: 8px;
            margin-top: 16px;
        }

        .tagline {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 48px;
        }

        /* 구분선 */
        .divider {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--border), transparent);
            margin: 0 auto 48px;
        }

        /* ── 게임 목록 ── */
        .games {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .game-row {
            background: var(--off-black);
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: background 0.18s;
            text-align: center;
        }

        .game-row:hover {
            background: var(--dim);
        }

        .game-icon {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .store-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            background: transparent;
            color: var(--soft);
            border: 1px solid var(--border);
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            white-space: nowrap;
        }

        .btn:hover {
            color: var(--white);
            border-color: #555;
            background: #1a1a1a;
        }

        /* ── FOOTER ── */
        footer {
            margin-top: 80px;
            padding-bottom: 48px;
            text-align: center;
        }

        .contact-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }

        .contact-link:hover {
            color: var(--soft);
            border-color: var(--muted);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 480px) {
            .logo { width: 220px; height: 220px; }
            .game-row { padding: 22px 20px; }
            .game-icon { width: 72px; height: 72px; }
            .game-title { font-size: 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }
    </style>
</head>
<body>

    <main class="hero">
        <div class="hero-inner">

            <div class="logo-wrap">
                <img src="img/team_logo.png" alt="TeamKuma" class="logo">
            </div>

            <h1 class="team-name">TeamKuma</h1>
            <p class="tagline">Indie Game Studio</p>

            <div class="divider"></div>

            <div class="games">
                <div class="game-row">
                    <img src="img/escape.png" alt="Escape the Cult Mansion" class="game-icon">
                    <div class="game-title">Escape the Cult Mansion</div>
                    <div class="store-links">
                        <a href="https://apps.apple.com/us/app/escape-the-cult-mansion/id6745683014" target="_blank" class="btn">App Store</a>
                        <a href="https://play.google.com/store/apps/details?id=com.teamkuma.theescape_cultmansion" target="_blank" class="btn">Play Store</a>
                    </div>
                </div>

                <div class="game-row">
                    <img src="img/wauh.png" alt="WAUH - Find Escape Room" class="game-icon">
                    <div class="game-title">WAUH — Find Escape Room</div>
                    <div class="store-links">
                        <a href="https://apps.apple.com/us/app/wauh-find-escape-room/id6751326457" target="_blank" class="btn">App Store</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <a href="https://teamkuma.tistory.com/3" target="_blank" class="contact-link">Contact / Blog</a>
    </footer>

</body>
</html>
